version: "3"
services: 
  api:
    image: kogameee/fastapi
    depends_on:
      - postgres
    ports: 
      - 80:8000
    env_file:
      - ./.env
    # command: uvicorn app.main:app --host 0.0.0.0 --port 8000 
  postgres:
    image: postgres
    environment:
      - POSTGRES_PASSWORD=password123
      - POSTGRESS_DB=fastapi
    volumes:
      - postgres-db:/var/lib/postgresql/data

volumes:
  postgres-db: